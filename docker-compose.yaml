services:
  app:
    build: .
    ports:
      - "6789:6789"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  app2:
    build: .
    ports:
      - "6790:6790"
    volumes:
      - ./config2.yaml:/app/config.yaml:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped
